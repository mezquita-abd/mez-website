<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="../index.html" class="nav-logo">
                <div class="logo-circle"><i class="fas fa-mosque"></i></div>
                <span>Quba</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="quran.html">Corán</a></li>
                <li><a href="prayer-times.html">Oración</a></li>
                <li><a href="calendar.html">Calendario</a></li>
                <li><a href="quiz.html">Quiz</a></li>
                <li><a href="wellness.html">Bienestar</a></li>
                <li><a href="about.html">Acerca</a></li>
            </ul>
            <div class="nav-actions">
                <div class="language-selector">
                    <button class="lang-btn" id="langBtn">
                        <i class="fas fa-globe"></i>
                        <span id="currentLang">ES</span>
                    </button>
                    <div class="lang-dropdown" id="langDropdown">
                        <button data-lang="es">🇪🇸 Español</button>
                        <button data-lang="en">🇬🇧 English</button>
                        <button data-lang="ar">🇸🇦 العربية</button>
                    </div>
                </div>
                <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container page-header-content">
            <h1><i class="fas fa-clock"></i> Horarios de Oración</h1>
            <p>Tiempos precisos de las 5 oraciones diarias</p>
        </div>
    </section>

    <section class="page-content">
        <div class="container">
            <div class="prayer-hero-card">
                <p class="prayer-hero-label">Siguiente oración</p>
                <h2 id="nextName">Dhuhr</h2>
                <div class="time-display" id="nextTime">12:30</div>
                <p class="countdown-big" id="nextCountdown">en 2 horas 15 minutos</p>
            </div>

            <div class="prayer-full-grid" id="prayerFullGrid">
                <!-- Filled by JS -->
            </div>

            <div style="text-align:center; margin-top: 40px;">
                <a href="qibla.html" class="btn btn-primary">
                    <i class="fas fa-compass"></i>
                    <span>Encontrar la Qibla</span>
                </a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top:none; padding-top:0;">
                <p>© 2026 Quba. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <script src="../js/translations.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const prayers = [
            { name: 'Fajr', ar:'الفجر', icon: 'fa-cloud-moon', time: '05:30' },
            { name: 'Sunrise', ar:'الشروق', icon: 'fa-sun', time: '06:48' },
            { name: 'Dhuhr', ar:'الظهر', icon: 'fa-sun', time: '12:30' },
            { name: 'Asr', ar:'العصر', icon: 'fa-cloud-sun', time: '15:45' },
            { name: 'Maghrib', ar:'المغرب', icon: 'fa-moon', time: '18:20' },
            { name: 'Isha', ar:'العشاء', icon: 'fa-star-and-crescent', time: '19:45' }
        ];

        const now = new Date();
        const cm = now.getHours()*60 + now.getMinutes();
        let nextIdx = 0;
        for (let i=0;i<prayers.length;i++){
            const [h,m] = prayers[i].time.split(':').map(Number);
            if (h*60+m > cm){ nextIdx=i; break; }
        }

        document.getElementById('nextName').textContent = prayers[nextIdx].name;
        document.getElementById('nextTime').textContent = prayers[nextIdx].time;
        const [h,m] = prayers[nextIdx].time.split(':').map(Number);
        let diff = (h*60+m) - cm;
        if (diff<0) diff += 24*60;
        document.getElementById('nextCountdown').textContent = `en ${Math.floor(diff/60)} horas ${diff%60} minutos`;

        document.getElementById('prayerFullGrid').innerHTML = prayers.map((p,i) => `
            <div class="prayer-full-card ${i===nextIdx?'active':''}">
                <div class="pf-icon"><i class="fas ${p.icon}"></i></div>
                <div class="pf-name">${p.name}</div>
                <div class="pf-time">${p.time}</div>
                <div class="pf-arabic">${p.ar}</div>
            </div>
        `).join('');
    </script>
</body>
</html>
