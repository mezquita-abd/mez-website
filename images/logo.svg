<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F5C4E"/>
      <stop offset="100%" style="stop-color:#0a4339"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C75A"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" stroke="url(#gold)" stroke-width="4"/>
  
  <!-- Mosque silhouette -->
  <g transform="translate(100, 100)">
    <!-- Central dome -->
    <path d="M -25,15 Q -25,-15 0,-25 Q 25,-15 25,15 Z" fill="url(#gold)"/>
    <!-- Crescent on dome -->
    <path d="M -3,-32 Q 6,-37 8,-30 Q 4,-34 -1,-31 Z" fill="url(#gold)"/>
    <line x1="0" y1="-25" x2="0" y2="-32" stroke="url(#gold)" stroke-width="2"/>
    
    <!-- Side minarets -->
    <rect x="-50" y="-10" width="6" height="40" fill="url(#gold)"/>
    <circle cx="-47" cy="-15" r="5" fill="url(#gold)"/>
    <rect x="44" y="-10" width="6" height="40" fill="url(#gold)"/>
    <circle cx="47" cy="-15" r="5" fill="url(#gold)"/>
    
    <!-- Base -->
    <rect x="-40" y="15" width="80" height="25" fill="url(#gold)" rx="2"/>
    
    <!-- Arch door -->
    <path d="M -8,40 L -8,28 Q 0,20 8,28 L 8,40 Z" fill="#0a4339"/>
  </g>
  
  <!-- Text "Quba" below -->
  <text x="100" y="180" text-anchor="middle" font-family="Amiri, serif" font-size="22" font-weight="bold" fill="url(#gold)">قُبَاء</text>
</svg>
