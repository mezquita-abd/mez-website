<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0F4C3A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Quba — Tu compañero espiritual islámico: Corán, oración, Qibla, calendario hijri, quiz gamificado">

  <title>Quba — Tu compañero espiritual</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="apple-touch-icon" href="assets/icon.png">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/screens.css">
  <link rel="stylesheet" href="css/wisdom.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

  <!-- Font Awesome para iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="splash">
    <div class="splash-content">
      <div class="splash-logo">🕌</div>
      <h1 class="splash-title">Quba</h1>
      <p class="splash-tagline">Tu compañero espiritual</p>
      <div class="splash-loader"></div>
    </div>
  </div>

  <!-- App Container -->
  <div id="app" class="app hidden">
    <main id="main-content" class="main-content"></main>

    <nav class="bottom-tabs">
      <button class="tab active" data-page="home">
        <i class="fas fa-home"></i>
        <span data-i18n="tabHome">Inicio</span>
      </button>
      <button class="tab" data-page="quran">
        <i class="fas fa-book-quran"></i>
        <span data-i18n="tabQuran">Corán</span>
      </button>
      <button class="tab" data-page="prayer">
        <i class="fas fa-mosque"></i>
        <span data-i18n="tabPrayer">Oración</span>
      </button>
      <button class="tab" data-page="wisdom">
        <i class="fas fa-lightbulb"></i>
        <span data-i18n="tabWisdom">Sabiduría</span>
      </button>
      <button class="tab" data-page="profile">
        <i class="fas fa-user"></i>
        <span data-i18n="tabProfile">Yo</span>
      </button>
    </nav>
  </div>

  <audio id="audio-player" preload="none"></audio>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-content" id="modal-content"></div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <!-- Core scripts -->
  <script src="js/i18n.js"></script>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/qibla.js"></script>
  <script src="js/duas.js"></script>
  <script src="js/hijri.js"></script>

  <!-- Phase 2: Quiz data -->
  <script src="data/quiz/quran.js"></script>
  <script src="data/quiz/sira.js"></script>
  <script src="data/quiz/hadith.js"></script>
  <script src="data/quiz/fiqh.js"></script>
  <script src="data/quiz/history.js"></script>
  <script src="data/quiz/prophets.js"></script>

  <!-- Phase 2: Adhkar data -->
  <script src="data/adhkar/morning.js"></script>
  <script src="data/adhkar/evening.js"></script>
  <script src="data/adhkar/sleep.js"></script>
  <script src="data/adhkar/after_prayer.js"></script>

  <!-- Phase 2: Courses data -->
  <script src="data/courses/how_to_pray.js"></script>
  <script src="data/courses/pillars.js"></script>
  <script src="data/courses/names_of_allah.js"></script>

  <!-- Phase 2: Gamification -->
  <script src="js/gamification.js"></script>

  <!-- Pages -->
  <script src="pages/home.js"></script>
  <script src="pages/quran.js"></script>
  <script src="pages/prayer.js"></script>
  <script src="pages/calendar.js"></script>
  <script src="pages/profile.js"></script>

  <!-- Phase 2: Wisdom subpages -->
  <script src="pages/wisdom/quiz.js"></script>
  <script src="pages/wisdom/tasbih.js"></script>
  <script src="pages/wisdom/adhkar.js"></script>
  <script src="pages/wisdom/courses.js"></script>
  <script src="pages/wisdom.js"></script>

  <!-- App core -->
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW error:', err));
      });
    }
  </script>
</body>
</html>
